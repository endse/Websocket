services:
  - type: web
    name: chat-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${CHAT_DB_HOST}:${CHAT_DB_PORT}/${CHAT_DB_DATABASE}
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: chat-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: chat-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-url.vercel.app
    healthCheckPath: /api/health

databases:
  - name: chat-db
    plan: free
